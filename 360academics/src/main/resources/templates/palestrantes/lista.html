<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseLayout :: layout(pageTitle=${titulo}, content=~{::content})}">
<th:block th:fragment="content">
    <section class="hero">
        <h1 th:text="${titulo}">Palestrantes</h1>
        <p>Professores e palestrantes cadastrados na plataforma.</p>
    </section>

    <section class="section-card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Especialidade</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="palestrante : ${palestrantes}">
                    <td th:text="${palestrante.nome}">Nome</td>
                    <td th:text="${palestrante.email}">email@exemplo.com</td>
                    <td th:text="${palestrante.especialidade}">Especialidade</td>
                    <td><a th:href="@{/palestrantes/{id}/editar(id=${palestrante.id})}">Editar</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(palestrantes)}">
                    <td colspan="4">Nenhum palestrante cadastrado ainda.</td>
                </tr>
            </tbody>
        </table>
    </section>

    <section class="section-card callout">
        <p>Cadastre um novo palestrante.</p>
        <a class="btn" th:href="@{/palestrantes/novo}">Novo palestrante</a>
    </section>
</th:block>
</html>
