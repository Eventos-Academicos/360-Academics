<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseLayout :: layout(pageTitle=${titulo}, content=~{::content})}">
<th:block th:fragment="content">
    <section class="hero">
        <h1 th:text="${titulo}">Atividade</h1>
        <p>Preencha os dados da atividade.</p>
    </section>

    <section class="section-card">
        <form method="post"
              th:action="${atividadeId} != null ? @{/eventos/{eventoId}/atividades/{id}(eventoId=${eventoId},id=${atividadeId})} : @{/eventos/{eventoId}/atividades(eventoId=${eventoId})}">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" name="titulo" required>

            <label for="horarioInicio">Início</label>
            <input type="datetime-local" id="horarioInicio" name="horarioInicio" required>

            <label for="horarioFim">Fim</label>
            <input type="datetime-local" id="horarioFim" name="horarioFim" required>

            <label for="local">Local</label>
            <input type="text" id="local" name="local" required>

            <label for="palestranteId">Palestrante</label>
            <input type="number" id="palestranteId" name="palestranteId" required>

            <button type="submit">Salvar</button>
        </form>
    </section>
</th:block>
</html>
