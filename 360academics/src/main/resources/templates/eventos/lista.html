<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseLayout :: layout(pageTitle=${titulo}, content=~{::content})}">
<th:block th:fragment="content">
    <section class="hero">
        <h1 th:text="${titulo}">Eventos</h1>
        <p>Eventos acadêmicos cadastrados na plataforma.</p>
    </section>

    <section class="section-card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Vagas</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="evento : ${eventos}">
                    <td th:text="${evento.nome}">Nome do evento</td>
                    <td th:text="${evento.dataInicio}">01/01/2026</td>
                    <td th:text="${evento.dataFim}">02/01/2026</td>
                    <td th:text="${evento.limiteVagas}">100</td>
                    <td><a th:href="@{/eventos/{id}(id=${evento.id})}">Ver</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(eventos)}">
                    <td colspan="5">Nenhum evento cadastrado ainda.</td>
                </tr>
            </tbody>
        </table>
    </section>

    <section class="section-card callout">
        <p>Cadastre um novo evento acadêmico.</p>
        <a class="btn" th:href="@{/eventos/novo}">Novo evento</a>
    </section>
</th:block>
</html>
