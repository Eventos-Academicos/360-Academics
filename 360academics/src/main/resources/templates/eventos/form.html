<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseLayout :: layout(pageTitle=${titulo}, content=~{::content})}">
<th:block th:fragment="content">
    <section class="hero">
        <h1 th:text="${titulo}">Evento</h1>
        <p>Preencha os dados do evento acadêmico.</p>
    </section>

    <section class="section-card">
        <form method="post"
              th:action="${id} != null ? @{/eventos/{id}(id=${id})} : @{/eventos}">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3"></textarea>

            <label for="dataInicio">Data de início</label>
            <input type="date" id="dataInicio" name="dataInicio" required>

            <label for="dataFim">Data de fim</label>
            <input type="date" id="dataFim" name="dataFim" required>

            <label for="limiteVagas">Limite de vagas</label>
            <input type="number" id="limiteVagas" name="limiteVagas" min="1" required>

            <button type="submit">Salvar</button>
        </form>
    </section>
</th:block>
</html>
