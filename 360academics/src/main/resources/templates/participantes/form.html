<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseLayout :: layout(pageTitle=${titulo}, content=~{::content})}">
<th:block th:fragment="content">
    <section class="hero">
        <h1 th:text="${titulo}">Participante</h1>
        <p>Preencha os dados do participante.</p>
    </section>

    <section class="section-card">
        <form method="post"
              th:action="${id} != null ? @{/participantes/{id}(id=${id})} : @{/participantes}">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required
                   th:value="${participante != null ? participante.nome : ''}">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required
                   th:value="${participante != null ? participante.email : ''}">

            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula" name="matricula" required
                   th:value="${participante != null ? participante.matricula : ''}">

            <button type="submit">Salvar</button>
        </form>
    </section>
</th:block>
</html>
